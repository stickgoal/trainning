server:
  port: 8082

spring:
  application:
    name: weather-agent-service
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-turbo

alibaba:
  a2a:
    nacos:
      server-addr: 127.0.0.1:8848
      registry:
        enabled: true
        namespace: public
        group: DEFAULT_GROUP
      discovery:
        enabled: true
        namespace: public
        group: DEFAULT_GROUP
      server:
        enabled: true
        card:
          name: weather_agent
          description: "天气查询智能体，提供城市天气查询和空气质量查询"
          version: "1.0.0"

logging:
  level:
    com.alibaba.cloud.ai: DEBUG