server:
  port: 8081

spring:
  application:
    name: math-agent-service
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-turbo

alibaba:
  a2a:
    nacos:
      server-addr: 127.0.0.1:8848
      registry:
        enabled: true
        namespace: public
        group: DEFAULT_GROUP
      discovery:
        enabled: true
        namespace: public
        group: DEFAULT_GROUP
      server:
        enabled: true
        card:
          name: math_agent
          description: "专业数学计算智能体，支持加减乘除、幂运算、阶乘等数学运算"
          version: "1.0.0"

logging:
  level:
    com.alibaba.cloud.ai: DEBUG