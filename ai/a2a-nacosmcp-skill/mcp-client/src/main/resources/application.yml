server:
  port: 8093

spring:
  application:
    name: mcp-client-service
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-turbo
    alibaba:
      mcp:
        nacos:
          server-addr: 127.0.0.1:8848
          namespace: public
          username: nacos
          password: nacos
          client:
            enabled: true
            sse:
              connections:
                weather-service:
                  service-name: weather-mcp-service
                  version: 1.0.0
                calculator-service:
                  service-name: calculator-mcp-service
                  version: 1.0.0

logging:
  level:
    com.alibaba.cloud.ai: DEBUG