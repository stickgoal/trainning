spring:
  application:
    name: langchain4j-demo
langchain4j:
  open-ai:
    chat-model:
      api-key: ${NVIDIA_API_KEY}           # 替换为你的 API Key
      base-url: https://integrate.api.nvidia.com/v1 # DeepSeek 的 base-url
      model-name: deepseek-ai/deepseek-v4-pro              # 模型名称
      temperature: 0.7                       # 可选，控制随机性
      log-requests: true                     # 可选，开启请求日志
      log-responses: true                    # 可选，开启响应日志
    streaming-chat-model:
      api-key: ${NVIDIA_API_KEY}           # 替换为你的 API Key
      base-url: https://integrate.api.nvidia.com/v1 # DeepSeek 的 base-url
      model-name: deepseek-ai/deepseek-v4-pro              # 模型名称
      temperature: 0.7                       # 可选，控制随机性
      log-requests: true                     # 可选，开启请求日志
      log-responses: true                    # 可选，开启响应日志
