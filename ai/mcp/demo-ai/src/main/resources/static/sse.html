<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI聊天对话框</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 400px;
            height: 500px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: white;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            border-bottom: 1px solid #ccc;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 5px;
        }
        .user-message {
            background-color: #dcf8c6;
            text-align: right;
        }
        .ai-message {
            background-color: #e0e0e0;
            text-align: left;
        }
        .input-area {
            display: flex;
            padding: 10px;
        }
        .input-box {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-right: 10px;
        }
        .send-button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .send-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <!-- 消息将在这里显示 -->
        </div>
        <div class="input-area">
            <input type="text" class="input-box" id="messageInput" placeholder="输入消息...">
            <button class="send-button" onclick="sendMessage()">发送</button>
        </div>
    </div>
    <!---- 添加 axios 引入 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let conversationId = null;
        let eventSource = null;

        // 页面加载时获取 conversationId
        window.onload = async function() {
            try {
                const response = await axios.get('/ai/getSessionId');
                conversationId = response.data;
                console.log('Conversation ID:', conversationId);
            } catch (error) {
                console.error('Failed to get conversation ID:', error);
            }
        };

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (message && conversationId) {
                addMessage(message, 'user');
                input.value = '';

                // 关闭之前的 EventSource 连接（如果存在）
                if (eventSource) {
                    eventSource.close();
                }

                // 创建新的 EventSource 连接
                eventSource = new EventSource(`/ai/chat/sse?conversationId=${encodeURIComponent(conversationId)}&question=${encodeURIComponent(message)}`);

                let aiMessageElement = null;

                eventSource.onmessage = function(event) {
                    const data = event.data;
                    if (data === '[DONE]') {
                        // 结束消息流
                        eventSource.close();
                        return;
                    }

                    if (!aiMessageElement) {
                        // 创建 AI 消息元素
                        aiMessageElement = addMessage('', 'ai');
                    }

                    // 更新 AI 消息内容
                    aiMessageElement.textContent += data;
                    scrollToBottom();
                };

                eventSource.onerror = function(err) {
                    console.error('EventSource failed:', err);
                    if (aiMessageElement) {
                        //TODO 解决出错问题 aiMessageElement.textContent += '\n抱歉，接收消息时出现错误。';
                    } else {
                        addMessage('抱歉，发送消息时出现错误。', 'ai');
                    }
                    eventSource.close();
                };
            }
        }

        function addMessage(text, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.classList.add(sender === 'user' ? 'user-message' : 'ai-message');
            messageElement.textContent = text;
            chatMessages.appendChild(messageElement);
            scrollToBottom();
            return messageElement; // 返回元素以便后续更新
        }

        function scrollToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 允许按Enter键发送消息
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
